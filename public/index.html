<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema RH — Gestão de Funcionários</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root { --bg:#f0f2f5;--sidebar:#0c1222;--card:#ffffff;--border:#e3e6eb;--text:#0f172a;--text-sec:#5a6577;--text-muted:#8e99a9;--accent:#2563eb;--accent-light:#dbeafe;--accent-dark:#1d4ed8;--success:#059669;--success-light:#d1fae5;--danger:#dc2626;--danger-light:#fee2e2;--warning:#d97706;--warning-light:#fef3c7;--radius:10px;--radius-lg:14px; }
  *{margin:0;padding:0;box-sizing:border-box}body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
  ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#c8cdd4;border-radius:10px}
  input,select,textarea{font-family:inherit}input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)!important;box-shadow:0 0 0 3px rgba(37,99,235,0.1)!important}
  .login-screen{display:flex;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#0c1222 0%,#1e3a5f 100%)}
  .login-card{background:#fff;border-radius:20px;padding:48px 40px;width:400px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
  .login-logo{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#2563eb,#60a5fa);display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:800;color:#fff;margin:0 auto 20px}
  .login-title{text-align:center;font-size:22px;font-weight:800;margin-bottom:4px}.login-sub{text-align:center;font-size:13px;color:var(--text-sec);margin-bottom:28px}
  .login-input{width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:10px;font-size:14px;margin-bottom:12px;background:#f8f9fb}
  .login-btn{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;font-family:inherit}
  .login-btn:hover{background:var(--accent-dark)}.login-toggle{text-align:center;margin-top:18px;font-size:13px;color:var(--text-sec)}
  .login-toggle a{color:var(--accent);cursor:pointer;font-weight:600;text-decoration:none}.login-error{background:var(--danger-light);color:var(--danger);padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px;display:none}
  .app{display:flex;height:100vh;overflow:hidden;display:none}
  .sidebar{width:250px;min-width:250px;background:var(--sidebar);display:flex;flex-direction:column}
  .sidebar-header{padding:24px 20px;border-bottom:1px solid rgba(255,255,255,0.06)}.sidebar-brand{display:flex;align-items:center;gap:12px}
  .sidebar-logo{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#2563eb,#60a5fa);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff}
  .sidebar-title{color:#f1f5f9;font-size:17px;font-weight:700}.sidebar-sub{color:#5a6577;font-size:11px;font-weight:500;margin-top:2px}
  .sidebar-nav{flex:1;padding:16px 10px;display:flex;flex-direction:column;gap:2px}
  .nav-label{font-size:10px;font-weight:700;color:#4a5568;text-transform:uppercase;letter-spacing:0.08em;padding:16px 12px 8px}
  .nav-item{display:flex;align-items:center;gap:11px;padding:10px 14px;border-radius:8px;cursor:pointer;transition:all 0.2s;color:#8e99a9;font-size:13.5px;font-weight:500;user-select:none}
  .nav-item:hover{background:rgba(96,165,250,0.08);color:#bcc5d3}.nav-item.active{background:rgba(96,165,250,0.14);color:#60a5fa;font-weight:600}
  .nav-icon{font-size:17px;width:22px;text-align:center;flex-shrink:0}
  .sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,0.06)}.sidebar-footer-info{font-size:12px;color:#4a5568;margin-bottom:8px}
  .logout-btn{width:100%;padding:8px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#8e99a9;font-size:12px;cursor:pointer;font-family:inherit;font-weight:600}
  .logout-btn:hover{background:rgba(255,255,255,0.1);color:#f1f5f9}
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .topbar{background:var(--card);padding:16px 30px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
  .topbar h1{font-size:18px;font-weight:700}.topbar-actions{display:flex;gap:10px;align-items:center}
  .content{flex:1;overflow-y:auto;padding:28px 30px}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:inherit}
  .btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-dark)}
  .btn-secondary{background:var(--card);border:1px solid var(--border);color:var(--text)}.btn-secondary:hover{background:#f8f9fb}
  .btn-success{background:var(--success);color:#fff}.btn-danger{background:var(--danger-light);color:var(--danger);border:1px solid #fecaca}
  .btn-sm{padding:6px 14px;font-size:12px}.btn-lg{padding:13px 28px;font-size:15px;font-weight:700}
  .search-input{padding:9px 14px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:#f8f9fb;width:280px}
  .card{background:var(--card);border-radius:var(--radius-lg);border:1px solid var(--border);padding:24px;margin-bottom:14px}
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px;margin-bottom:24px}
  .stat-card{background:var(--card);border-radius:var(--radius-lg);padding:22px;border:1px solid var(--border)}.stat-label{font-size:12px;color:var(--text-muted);font-weight:600;margin-bottom:8px}.stat-value{font-size:32px;font-weight:800}
  .table-wrap{background:var(--card);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden}
  table{width:100%;border-collapse:collapse}thead th{padding:13px 18px;text-align:left;font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;border-bottom:2px solid var(--border);background:#f8f9fb}
  tbody td{padding:13px 18px;font-size:13px;color:var(--text-sec);border-bottom:1px solid #f4f5f7}tbody tr{cursor:pointer;transition:background 0.15s}tbody tr:hover{background:#f8f9fb}
  .avatar{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;overflow:hidden}
  .avatar img{width:100%;height:100%;object-fit:cover}.avatar-lg{width:56px;height:56px;font-size:20px;border-radius:14px}
  .badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:6px}
  .form-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px 14px}.form-grid .full{grid-column:1/-1}
  .form-group label{display:block;font-size:11px;font-weight:600;color:var(--text-sec);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.02em}
  .form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:#f8f9fb}
  .form-group textarea{resize:vertical;min-height:70px}.form-group .filled{border-color:#93c5fd;background:rgba(37,99,235,0.03)}
  .upload-zone{border:2px dashed #c8cdd4;border-radius:14px;padding:50px 30px;text-align:center;cursor:pointer;transition:all 0.2s;background:#fafbfc}
  .upload-zone:hover{border-color:var(--accent);background:rgba(37,99,235,0.02)}
  .step-num{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0}
  .check-card{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;border:2px solid var(--border);cursor:pointer;transition:all 0.15s}
  .check-card.selected{border-color:var(--accent);background:rgba(37,99,235,0.03)}
  .check-box{width:20px;height:20px;border-radius:6px;border:2px solid #c8cdd4;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;flex-shrink:0}
  .check-card.selected .check-box{background:var(--accent);border-color:var(--accent)}
  .section-label{font-size:12px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:14px}
  .detail-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px 20px}
  .detail-label{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:3px}.detail-value{font-size:14px;font-weight:500}
  .action-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .action-card{background:var(--card);border-radius:var(--radius-lg);padding:26px;border:1px solid var(--border);cursor:pointer;transition:all 0.2s}
  .action-card:hover{border-color:var(--accent);box-shadow:0 4px 16px rgba(0,0,0,0.06);transform:translateY(-1px)}
  .result-row{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border:1px solid var(--border);border-radius:10px;margin-bottom:8px}
  .img-preview{position:relative;border-radius:10px;overflow:hidden;border:1px solid var(--border)}.img-preview img{width:100%;max-height:380px;object-fit:contain;background:#f4f5f7;display:block}
  .img-close{position:absolute;top:6px;right:6px;width:28px;height:28px;border-radius:7px;background:rgba(0,0,0,0.55);color:#fff;border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
  .empty{text-align:center;padding:60px 20px;color:var(--text-muted)}
  .toast{position:fixed;top:20px;right:20px;padding:13px 22px;border-radius:10px;font-size:13px;font-weight:600;color:#fff;z-index:9999;box-shadow:0 8px 30px rgba(0,0,0,0.15);animation:slideIn 0.35s ease;display:none}
  .loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,0.8);display:flex;align-items:center;justify-content:center;z-index:999;display:none}
  .spinner{width:40px;height:40px;border:4px solid #e3e6eb;border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
  .photo-upload{width:120px;height:140px;border-radius:12px;border:2px dashed #c8cdd4;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;background:#f8f9fb;transition:all 0.2s;flex-shrink:0}
  .photo-upload:hover{border-color:var(--accent)}.photo-upload img{width:100%;height:100%;object-fit:cover}
  .photo-upload-text{font-size:11px;color:var(--text-muted);text-align:center;padding:4px}
  @keyframes slideIn{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  @keyframes spin{to{transform:rotate(360deg)}}.anim{animation:fadeUp 0.35s ease}
</style>
</head>
<body>
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">RH</div>
    <div class="login-title" id="authTitle">Entrar no Sistema</div>
    <div class="login-sub" id="authSub">Faça login para acessar o Sistema RH</div>
    <div class="login-error" id="authError"></div>
    <div id="authFields">
      <input class="login-input" id="authUser" placeholder="Usuário" autocomplete="username">
      <input class="login-input" id="authPass" type="password" placeholder="Senha" autocomplete="current-password">
    </div>
    <button class="login-btn" id="authBtn" onclick="handleAuth()">Entrar</button>
    <div class="login-toggle" id="authToggle">Não tem conta? <a onclick="toggleAuthMode()">Criar conta</a></div>
  </div>
</div>
<div class="app" id="app">
  <div class="sidebar">
    <div class="sidebar-header"><div class="sidebar-brand"><div class="sidebar-logo">RH</div><div><div class="sidebar-title">Sistema RH</div><div class="sidebar-sub">Gestão de Funcionários</div></div></div></div>
    <nav class="sidebar-nav">
      <div class="nav-label">Principal</div>
      <div class="nav-item active" data-view="dashboard" onclick="goTo('dashboard')"><span class="nav-icon">◉</span> Painel</div>
      <div class="nav-item" data-view="list" onclick="goTo('list')"><span class="nav-icon">☰</span> Funcionários</div>
      <div class="nav-label">Ferramentas</div>
      <div class="nav-item" data-view="add" onclick="goTo('add')"><span class="nav-icon">+</span> Novo Cadastro</div>
      <div class="nav-item" data-view="ocr" onclick="goTo('ocr')"><span class="nav-icon">⎘</span> Importar Ficha</div>
      <div class="nav-item" data-view="form-filler" onclick="goTo('form-filler')"><span class="nav-icon">✎</span> Preencher Formulário</div>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-footer-info">Olá, <strong id="userName">Usuário</strong></div>
      <div class="sidebar-footer-info" id="empCounter" style="margin-bottom:10px">0 funcionários</div>
      <button class="logout-btn" onclick="logout()">Sair da conta</button>
    </div>
  </div>
  <div class="main">
    <div class="topbar"><h1 id="pageTitle">Painel</h1><div class="topbar-actions" id="topbarActions"></div></div>
    <div class="content" id="content"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
<input type="file" id="fileInput" accept="image/*" style="display:none">
<input type="file" id="photoInput" accept="image/*" capture="user" style="display:none">

<script>
const SECTIONS=[{section:"Dados Pessoais",fields:[{key:"nome",label:"Nome Completo",full:true},{key:"cpf",label:"CPF"},{key:"rg",label:"RG"},{key:"orgaoEmissor",label:"Órgão Emissor"},{key:"dataNascimento",label:"Data de Nascimento"},{key:"sexo",label:"Sexo",options:["Masculino","Feminino","Outro"]},{key:"estadoCivil",label:"Estado Civil",options:["Solteiro(a)","Casado(a)","Divorciado(a)","Viúvo(a)","União Estável"]},{key:"nacionalidade",label:"Nacionalidade"},{key:"naturalidade",label:"Naturalidade"},{key:"nomeMae",label:"Nome da Mãe",full:true},{key:"nomePai",label:"Nome do Pai",full:true}]},{section:"Endereço",fields:[{key:"endereco",label:"Logradouro",full:true},{key:"numero",label:"Número"},{key:"complemento",label:"Complemento"},{key:"bairro",label:"Bairro"},{key:"cidade",label:"Cidade"},{key:"estado",label:"UF"},{key:"cep",label:"CEP"}]},{section:"Contato",fields:[{key:"telefone",label:"Telefone"},{key:"celular",label:"Celular"},{key:"email",label:"E-mail",full:true}]},{section:"Documentos Trabalhistas",fields:[{key:"ctpsNumero",label:"CTPS Número"},{key:"ctpsSerie",label:"CTPS Série"},{key:"ctpsUf",label:"CTPS UF"},{key:"pisPasep",label:"PIS/PASEP"},{key:"tituloEleitor",label:"Título de Eleitor"},{key:"zonaEleitoral",label:"Zona"},{key:"secaoEleitoral",label:"Seção"},{key:"reservista",label:"Cert. Reservista"},{key:"cnhNumero",label:"CNH Número"},{key:"cnhCategoria",label:"CNH Categoria"},{key:"cnhValidade",label:"CNH Validade"}]},{section:"Dados Profissionais",fields:[{key:"cargo",label:"Cargo"},{key:"departamento",label:"Departamento"},{key:"dataAdmissao",label:"Data de Admissão"},{key:"salario",label:"Salário (R$)"},{key:"tipoContrato",label:"Tipo de Contrato",options:["CLT","PJ","Temporário","Estágio","Menor Aprendiz"]},{key:"jornadaTrabalho",label:"Jornada de Trabalho"},{key:"escolaridade",label:"Escolaridade",options:["Fundamental Incompleto","Fundamental Completo","Médio Incompleto","Médio Completo","Superior Incompleto","Superior Completo","Pós-Graduação","Mestrado","Doutorado"]}]},{section:"Dados Bancários",fields:[{key:"banco",label:"Banco"},{key:"agencia",label:"Agência"},{key:"conta",label:"Conta"},{key:"tipoConta",label:"Tipo de Conta",options:["Corrente","Poupança"]},{key:"chavePix",label:"Chave PIX",full:true}]},{section:"Saúde",fields:[{key:"tipoSanguineo",label:"Tipo Sanguíneo",options:["A+","A-","B+","B-","AB+","AB-","O+","O-"]},{key:"alergias",label:"Alergias",full:true},{key:"contatoEmergencia",label:"Contato de Emergência",full:true},{key:"telEmergencia",label:"Telefone Emergência"}]},{section:"Dependentes",fields:[{key:"dependentes",label:"Dependentes (Nome, Parentesco, Nascimento, CPF)",full:true,multiline:true}]}];
const ALL_KEYS=SECTIONS.flatMap(s=>s.fields.map(f=>f.key));
function emptyEmp(){const o={};ALL_KEYS.forEach(k=>o[k]='');o.photo='';return o;}
function ini(n){return(n||'?').split(' ').slice(0,2).map(w=>(w[0]||'').toUpperCase()).join('')}
function avatarHTML(emp,cls=''){
  if(emp.photo) return `<div class="avatar ${cls}" style="background:#eee"><img src="${emp.photo}" alt=""></div>`;
  return `<div class="avatar ${cls}" style="background:#dbeafe;color:var(--accent)">${ini(emp.nome)}</div>`;
}

let employees=[],currentView='dashboard',editData=emptyEmp(),selectedId=null,authMode='login';
let ocrImageData=null,ocrImageType='',formImageData=null,formImageType='',formFields=null,formSelectedEmps=[],formResult=null;

async function api(url,opts={}){const res=await fetch(url,{headers:{'Content-Type':'application/json'},...opts,body:opts.body?JSON.stringify(opts.body):undefined});const data=await res.json();if(!res.ok)throw new Error(data.error||'Erro');return data}
function showToast(m,t='success'){const e=document.getElementById('toast');e.textContent=m;e.style.background=t==='error'?'#dc2626':t==='warning'?'#d97706':'#059669';e.style.display='block';setTimeout(()=>e.style.display='none',3000)}
function showLoading(v){document.getElementById('loadingOverlay').style.display=v?'flex':'none'}

function toggleAuthMode(){
  authMode=authMode==='login'?'register':'login';
  document.getElementById('authTitle').textContent=authMode==='login'?'Entrar no Sistema':'Criar Conta';
  document.getElementById('authSub').textContent=authMode==='login'?'Faça login para acessar o Sistema RH':'Crie sua conta para começar';
  document.getElementById('authBtn').textContent=authMode==='login'?'Entrar':'Criar Conta';
  document.getElementById('authFields').innerHTML=authMode==='register'
    ?'<input class="login-input" id="authName" placeholder="Seu nome completo"><input class="login-input" id="authUser" placeholder="Escolha um usuário" autocomplete="username"><input class="login-input" id="authPass" type="password" placeholder="Escolha uma senha" autocomplete="new-password">'
    :'<input class="login-input" id="authUser" placeholder="Usuário" autocomplete="username"><input class="login-input" id="authPass" type="password" placeholder="Senha" autocomplete="current-password">';
  document.getElementById('authToggle').innerHTML=authMode==='register'?'Já tem conta? <a onclick="toggleAuthMode()">Fazer login</a>':'Não tem conta? <a onclick="toggleAuthMode()">Criar conta</a>';
  document.getElementById('authError').style.display='none';
}
async function handleAuth(){
  const err=document.getElementById('authError');err.style.display='none';
  const u=document.getElementById('authUser')?.value?.trim(),p=document.getElementById('authPass')?.value,n=document.getElementById('authName')?.value?.trim();
  if(authMode==='register'&&!n){err.textContent='Preencha seu nome';err.style.display='block';return}
  if(!u||!p){err.textContent='Preencha todos os campos';err.style.display='block';return}
  try{showLoading(true);const d=await api(authMode==='login'?'/api/login':'/api/register',{method:'POST',body:authMode==='login'?{username:u,password:p}:{username:u,password:p,name:n}});enterApp(d.name)}catch(e){err.textContent=e.message;err.style.display='block'}finally{showLoading(false)}
}
async function checkAuth(){try{const d=await api('/api/me');if(d.logged)enterApp(d.name)}catch{}}
async function enterApp(name){document.getElementById('loginScreen').style.display='none';document.getElementById('app').style.display='flex';document.getElementById('userName').textContent=name;await loadEmployees();render()}
async function logout(){try{await api('/api/logout',{method:'POST'})}catch{}document.getElementById('loginScreen').style.display='flex';document.getElementById('app').style.display='none';employees=[]}

async function loadEmployees(){try{employees=await api('/api/employees')}catch{employees=[]}updateCounter()}
function updateCounter(){const c=employees.length;document.getElementById('empCounter').textContent=c+' funcionário'+(c!==1?'s':'')+' cadastrado'+(c!==1?'s':'')}

async function saveEmployee(){
  if(!editData.nome?.trim()){showToast('Nome é obrigatório','error');return}
  showLoading(true);
  try{
    if(editData.id){await api('/api/employees/'+editData.id,{method:'PUT',body:editData})}
    else{await api('/api/employees',{method:'POST',body:editData})}
    await loadEmployees();showToast(editData.id?'Funcionário atualizado!':'Funcionário cadastrado!');goTo('list');
  }catch(e){showToast(e.message,'error')}showLoading(false);
}
async function deleteEmp(id){if(!confirm('Tem certeza que deseja excluir?'))return;showLoading(true);try{await api('/api/employees/'+id,{method:'DELETE'});await loadEmployees();showToast('Excluído');goTo('list')}catch(e){showToast(e.message,'error')}showLoading(false)}

function goTo(v,id){currentView=v;selectedId=id||null;if(v==='add')editData=emptyEmp();if(v==='edit'&&id){const e=employees.find(x=>x.id==id);if(e)editData={...e}}if(v==='ocr')ocrImageData=null;if(v==='form-filler'){formImageData=null;formFields=null;formSelectedEmps=[];formResult=null}render()}

function render(){
  document.querySelectorAll('.nav-item').forEach(n=>{const v=n.dataset.view;n.classList.toggle('active',v===currentView||(v==='list'&&(currentView==='detail'||currentView==='edit')))});
  const titles={dashboard:'Painel',list:'Funcionários',add:'Novo Cadastro',edit:'Editar Funcionário',detail:'Detalhes do Funcionário',ocr:'Importar Ficha via OCR','form-filler':'Preencher Formulário'};
  document.getElementById('pageTitle').textContent=titles[currentView]||'Sistema RH';
  const ta=document.getElementById('topbarActions');
  ta.innerHTML=(currentView==='list'||currentView==='dashboard')?'<input class="search-input" placeholder="Buscar por nome, CPF ou cargo..." oninput="handleSearch(this.value)"><button class="btn btn-primary" onclick="goTo(\'add\')">+ Novo</button>':'';
  const el=document.getElementById('content');
  switch(currentView){
    case'dashboard':renderDashboard(el);break;case'list':renderList(el,'');break;case'add':case'edit':renderForm(el);break;
    case'detail':renderDetail(el);break;case'ocr':renderOCR(el);break;case'form-filler':renderFormFiller(el);break;
  }updateCounter();
}
function handleSearch(v){if(currentView==='dashboard')currentView='list';renderList(document.getElementById('content'),v)}

function renderDashboard(el){
  const e=employees,clt=e.filter(x=>x.tipoContrato==='CLT').length,pj=e.filter(x=>x.tipoContrato==='PJ').length,rec=e.filter(x=>{if(!x.dataAdmissao)return false;return(Date.now()-new Date(x.dataAdmissao).getTime())/864e5<=90}).length;
  let h=`<div class="anim"><div class="stats-grid"><div class="stat-card"><div class="stat-label">Total de Funcionários</div><div class="stat-value" style="color:var(--accent)">${e.length}</div></div><div class="stat-card"><div class="stat-label">Regime CLT</div><div class="stat-value" style="color:var(--success)">${clt}</div></div><div class="stat-card"><div class="stat-label">Regime PJ</div><div class="stat-value" style="color:var(--warning)">${pj}</div></div><div class="stat-card"><div class="stat-label">Admitidos (90 dias)</div><div class="stat-value" style="color:#0891b2">${rec}</div></div></div>
  <div class="action-grid"><div class="action-card" onclick="goTo('ocr')"><div style="font-size:26px;margin-bottom:10px">📄</div><div style="font-size:15px;font-weight:700;margin-bottom:4px">Importar Ficha</div><div style="font-size:12.5px;color:var(--text-muted);line-height:1.6">Tire foto ou suba print de ficha de registro — IA extrai tudo</div></div><div class="action-card" onclick="goTo('form-filler')"><div style="font-size:26px;margin-bottom:10px">📋</div><div style="font-size:15px;font-weight:700;margin-bottom:4px">Preencher Formulário</div><div style="font-size:12.5px;color:var(--text-muted);line-height:1.6">Suba formulário, selecione funcionários, imprima preenchido</div></div></div>`;
  if(e.length>0){h+='<div style="margin-top:24px"><h3 style="font-size:15px;font-weight:700;margin-bottom:14px">Últimos cadastros</h3>';e.slice(0,5).forEach(x=>{h+=`<div class="result-row" onclick="goTo('detail','${x.id}')" style="cursor:pointer"><div style="display:flex;align-items:center;gap:12px">${avatarHTML(x)}<div><div style="font-weight:600;font-size:13px">${x.nome}</div><div style="font-size:12px;color:var(--text-muted)">${x.cargo||'Sem cargo'} ${x.cpf?'· '+x.cpf:''}</div></div></div><div style="font-size:12px;color:var(--text-muted)">${x.dataAdmissao||''}</div></div>`});h+='</div>'}
  h+='</div>';el.innerHTML=h;
}

function renderList(el,search){
  const s=(search||'').toLowerCase(),f=employees.filter(e=>!s||e.nome?.toLowerCase().includes(s)||e.cpf?.includes(s)||e.cargo?.toLowerCase().includes(s));
  if(!f.length){el.innerHTML=`<div class="anim empty"><div style="font-size:44px;margin-bottom:14px;opacity:.6">☰</div><div style="font-size:15px;font-weight:600;margin-bottom:6px">${employees.length===0?'Nenhum funcionário':'Nenhum resultado'}</div></div>`;return}
  let h='<div class="anim table-wrap"><table><thead><tr><th>Funcionário</th><th>CPF</th><th>Cargo</th><th>Admissão</th><th>Contrato</th><th></th></tr></thead><tbody>';
  f.forEach(e=>{const bc=e.tipoContrato==='CLT'?'background:#d1fae5;color:#166534':e.tipoContrato==='PJ'?'background:#fef3c7;color:#854d0e':'background:#f1f5f9;color:#475569';
    h+=`<tr onclick="goTo('detail','${e.id}')"><td><div style="display:flex;align-items:center;gap:10px">${avatarHTML(e)}<div><div style="font-weight:600;color:var(--text)">${e.nome}</div><div style="font-size:11px;color:var(--text-muted)">${e.email||''}</div></div></div></td><td>${e.cpf||'—'}</td><td>${e.cargo||'—'}</td><td>${e.dataAdmissao||'—'}</td><td>${e.tipoContrato?'<span class="badge" style="'+bc+'">'+e.tipoContrato+'</span>':'—'}</td><td style="text-align:right;color:var(--text-muted);font-size:18px">›</td></tr>`});
  h+='</tbody></table></div>';el.innerHTML=h;
}

function renderDetail(el){
  const e=employees.find(x=>x.id==selectedId);if(!e){el.innerHTML='Não encontrado';return}
  let h=`<div class="anim"><div style="display:flex;gap:10px;margin-bottom:20px"><button class="btn btn-secondary" onclick="goTo('list')">← Voltar</button><button class="btn btn-primary" onclick="goTo('edit','${e.id}')">Editar</button><button class="btn btn-danger" onclick="deleteEmp('${e.id}')">Excluir</button></div>
  <div class="card"><div style="display:flex;align-items:center;gap:18px">${avatarHTML(e,'avatar-lg')}<div><h2 style="font-size:20px;font-weight:800">${e.nome}</h2><div style="font-size:13px;color:var(--text-sec);margin-top:3px">${e.cargo||'Sem cargo'} ${e.departamento?'· '+e.departamento:''}</div></div></div></div>`;
  SECTIONS.forEach(s=>{if(!s.fields.some(f=>e[f.key]))return;h+=`<div class="card"><div class="section-label">${s.section}</div><div class="detail-grid">`;s.fields.filter(f=>e[f.key]).forEach(f=>{h+=`<div ${f.full?'style="grid-column:1/-1"':''}><div class="detail-label">${f.label}</div><div class="detail-value">${f.multiline?(e[f.key]||'').replace(/\n/g,'<br>'):e[f.key]}</div></div>`});h+='</div></div>'});
  h+='</div>';el.innerHTML=h;
}

function renderForm(el){
  let h=`<div class="anim"><div style="display:flex;gap:10px;margin-bottom:20px"><button class="btn btn-secondary" onclick="goTo('list')">← Voltar</button><button class="btn btn-success btn-lg" onclick="saveEmployee()">Salvar Funcionário</button></div>
  <div class="card"><div class="section-label">Foto do Funcionário</div><div style="display:flex;align-items:center;gap:20px">
    <div class="photo-upload" onclick="pickPhoto()" id="photoArea">${editData.photo?'<img src="'+editData.photo+'" alt="Foto">':'<div class="photo-upload-text">📷<br>Clique para<br>adicionar foto</div>'}</div>
    <div><div style="font-size:13px;color:var(--text-sec);margin-bottom:8px">Clique na área ao lado para tirar foto ou enviar uma imagem do funcionário.</div>${editData.photo?'<button class="btn btn-sm btn-danger" onclick="editData.photo=\\'\\';render()">Remover foto</button>':''}</div>
  </div></div>`;
  SECTIONS.forEach(s=>{h+=`<div class="card"><div class="section-label">${s.section}</div><div class="form-grid">`;s.fields.forEach(f=>{const v=editData[f.key]||'';const cls=f.full?'form-group full':'form-group';const fc=v?'filled':'';
    h+=`<div class="${cls}"><label>${f.label}</label>`;
    if(f.options)h+=`<select class="${fc}" onchange="editData['${f.key}']=this.value"><option value="">Selecione...</option>${f.options.map(o=>`<option value="${o}" ${v===o?'selected':''}>${o}</option>`).join('')}</select>`;
    else if(f.multiline)h+=`<textarea class="${fc}" onchange="editData['${f.key}']=this.value" rows="3">${v}</textarea>`;
    else h+=`<input type="text" class="${fc}" value="${v}" onchange="editData['${f.key}']=this.value">`;
    h+='</div>'});h+='</div></div>'});
  h+='<button class="btn btn-success btn-lg" onclick="saveEmployee()">Salvar Funcionário</button></div>';el.innerHTML=h;
}

function pickPhoto(){
  const inp=document.getElementById('photoInput');
  inp.onchange=async e=>{const file=e.target.files[0];if(!file)return;
    // Resize image to save space
    const img=new Image();const reader=new FileReader();
    reader.onload=ev=>{img.onload=()=>{const canvas=document.createElement('canvas');const MAX=300;let w=img.width,ht=img.height;if(w>ht){if(w>MAX){ht*=MAX/w;w=MAX}}else{if(ht>MAX){w*=MAX/ht;ht=MAX}}canvas.width=w;canvas.height=ht;canvas.getContext('2d').drawImage(img,0,0,w,ht);editData.photo=canvas.toDataURL('image/jpeg',0.8);render()};img.src=ev.target.result};
    reader.readAsDataURL(file);inp.value='';
  };inp.click();
}

function renderOCR(el){
  let h=`<div class="anim" style="max-width:780px"><div class="card"><h3 style="font-size:15px;font-weight:700;margin-bottom:6px">Importar Ficha de Registro</h3><p style="font-size:13px;color:var(--text-sec);margin-bottom:22px;line-height:1.6">Tire uma foto ou suba um print da ficha de registro. A IA irá ler o documento e extrair automaticamente todos os dados do funcionário.</p>`;
  if(!ocrImageData)h+=`<div class="upload-zone" onclick="pickImage('ocr')"><div style="font-size:36px;margin-bottom:10px">📄</div><div style="font-size:14px;font-weight:600;margin-bottom:4px">Clique para enviar a ficha</div><div style="font-size:12px;color:var(--text-muted)">JPG, PNG ou qualquer formato de imagem</div></div>`;
  else h+=`<div class="img-preview" style="margin-bottom:14px"><img src="data:${ocrImageType};base64,${ocrImageData}"><button class="img-close" onclick="ocrImageData=null;render()">×</button></div><div style="display:flex;gap:10px"><button class="btn btn-primary btn-lg" style="flex:1" onclick="runOCR()" id="ocrBtn">Extrair Dados com IA</button><button class="btn btn-secondary" onclick="pickImage('ocr')">Trocar imagem</button></div>`;
  h+='<div id="ocrError"></div></div><div id="ocrResultArea"></div></div>';el.innerHTML=h;
}

function pickImage(target){const inp=document.getElementById('fileInput');inp.onchange=async e=>{const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>{const b64=ev.target.result.split(',')[1];const tp=file.type||'image/jpeg';if(target==='ocr'){ocrImageData=b64;ocrImageType=tp}else{formImageData=b64;formImageType=tp}inp.value='';render()};r.readAsDataURL(file)};inp.click()}

async function runOCR(){
  const btn=document.getElementById('ocrBtn');btn.textContent='Analisando com IA...';btn.disabled=true;btn.style.background='#94a3b8';
  document.getElementById('ocrError').innerHTML='';
  try{
    const parsed=await api('/api/ocr',{method:'POST',body:{image:ocrImageData,mimeType:ocrImageType,type:'ocr'}});
    editData=emptyEmp();Object.keys(parsed).forEach(k=>{if(parsed[k]&&editData.hasOwnProperty(k))editData[k]=parsed[k]});
    showToast('Dados extraídos com sucesso!');
    let rh=`<div class="card" style="margin-top:14px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px"><div><h3 style="font-size:15px;font-weight:700">Dados Extraídos</h3><p style="font-size:12px;color:var(--text-sec)">Revise, adicione a foto e salve</p></div><button class="btn btn-success" onclick="saveEmployee()">Salvar Funcionário</button></div>
    <div style="display:flex;align-items:center;gap:20px;margin-bottom:18px;padding-bottom:18px;border-bottom:1px solid var(--border)">
      <div class="photo-upload" onclick="pickPhoto()" id="photoArea">${editData.photo?'<img src="'+editData.photo+'">':'<div class="photo-upload-text">📷<br>Adicionar<br>foto</div>'}</div>
      <div><div style="font-size:15px;font-weight:700">${editData.nome||'Nome não identificado'}</div><div style="font-size:13px;color:var(--text-sec);margin-top:2px">${editData.cargo||''} ${editData.cpf?'· CPF: '+editData.cpf:''}</div></div></div>`;
    SECTIONS.forEach(s=>{rh+=`<div class="section-label" style="margin-top:14px">${s.section}</div><div class="form-grid">`;s.fields.forEach(f=>{const v=editData[f.key]||'';const cls=f.full?'form-group full':'form-group';const fc=v?'filled':'';
      rh+=`<div class="${cls}"><label>${f.label}</label>`;
      if(f.options)rh+=`<select class="${fc}" onchange="editData['${f.key}']=this.value"><option value="">—</option>${f.options.map(o=>`<option value="${o}" ${v===o?'selected':''}>${o}</option>`).join('')}</select>`;
      else rh+=`<input type="text" class="${fc}" value="${v}" onchange="editData['${f.key}']=this.value">`;
      rh+='</div>'});rh+='</div>'});
    rh+='<button class="btn btn-success btn-lg" onclick="saveEmployee()" style="margin-top:14px">Salvar Funcionário</button></div>';
    document.getElementById('ocrResultArea').innerHTML=rh;
  }catch(err){document.getElementById('ocrError').innerHTML=`<div style="margin-top:14px;padding:12px 16px;background:var(--danger-light);border:1px solid #fecaca;border-radius:10px;color:var(--danger);font-size:13px">${err.message||'Erro ao processar imagem.'}</div>`}
  btn.textContent='Extrair Dados com IA';btn.disabled=false;btn.style.background='';
}

function renderFormFiller(el){
  if(!employees.length){el.innerHTML='<div class="anim empty"><div style="font-size:44px;margin-bottom:14px;opacity:.6">📋</div><div style="font-size:15px;font-weight:600;margin-bottom:6px">Nenhum funcionário</div><div style="font-size:13px;margin-bottom:18px">Cadastre funcionários primeiro</div><button class="btn btn-primary" onclick="goTo(\'add\')">Cadastrar</button></div>';return}
  let h='<div class="anim">';
  h+=`<div class="card"><div style="display:flex;align-items:center;gap:12px;margin-bottom:16px"><div class="step-num" style="background:var(--accent-light);color:var(--accent)">1</div><div><h3 style="font-size:14px;font-weight:700;margin:0">Enviar Formulário</h3><p style="font-size:12px;color:var(--text-sec);margin:0">Suba a imagem do formulário</p></div></div>`;
  if(!formImageData)h+='<div class="upload-zone" onclick="pickImage(\'form\')"><div style="font-size:14px;font-weight:600">Clique para enviar</div><div style="font-size:12px;color:var(--text-muted);margin-top:4px">Plano de saúde, vale-transporte, declaração, etc.</div></div>';
  else h+=`<div style="display:flex;gap:14px;align-items:flex-start"><div class="img-preview" style="flex:0 0 200px"><img src="data:${formImageType};base64,${formImageData}" style="width:200px;height:150px;object-fit:cover"><button class="img-close" onclick="formImageData=null;formFields=null;formResult=null;render()">×</button></div><div style="flex:1"><button class="btn btn-primary" style="width:100%" onclick="analyzeForm()" id="formBtn">${formFields?'✓ Analisado':'Analisar Formulário'}</button>${formFields?'<div style="margin-top:6px;font-size:12px;color:var(--success);font-weight:600">'+(formFields.fields?.length||0)+' campos — "'+formFields.formTitle+'"</div>':''}</div></div>`;
  h+='</div>';
  if(formFields){h+=`<div class="card"><div style="display:flex;align-items:center;gap:12px;margin-bottom:16px"><div class="step-num" style="background:var(--accent-light);color:var(--accent)">2</div><div><h3 style="font-size:14px;font-weight:700;margin:0">Selecionar Funcionários</h3></div></div><div style="display:flex;gap:8px;margin-bottom:14px"><button class="btn btn-sm btn-secondary" onclick="formSelectedEmps=employees.map(e=>e.id);render()">Todos</button><button class="btn btn-sm btn-secondary" onclick="formSelectedEmps=[];render()">Limpar</button></div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px">`;
    employees.forEach(e=>{const sel=formSelectedEmps.includes(e.id);h+=`<div class="check-card ${sel?'selected':''}" onclick="toggleFormEmp(${e.id})"><div class="check-box">${sel?'✓':''}</div><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.nome}</div><div style="font-size:11px;color:var(--text-muted)">${e.cargo||'Sem cargo'}</div></div></div>`});
    h+='</div>';if(formSelectedEmps.length>0)h+=`<button class="btn btn-success btn-lg" style="width:100%;margin-top:14px" onclick="generateForms()">Gerar ${formSelectedEmps.length} formulário${formSelectedEmps.length>1?'s':''}</button>`;h+='</div>'}
  if(formResult){h+=`<div class="card"><div style="display:flex;align-items:center;gap:12px;margin-bottom:16px"><div class="step-num" style="background:var(--success-light);color:var(--success)">3</div><div><h3 style="font-size:14px;font-weight:700;margin:0">Formulários Prontos</h3></div></div>`;
    formResult.forEach((r,i)=>{h+=`<div class="result-row"><div style="display:flex;align-items:center;gap:10px">${avatarHTML(r.employee)}<div><div style="font-weight:600;font-size:13px">${r.employee.nome}</div><div style="font-size:11px;color:var(--text-muted)">${r.fields.filter(f=>f.value).length}/${r.fields.length} campos</div></div></div><button class="btn btn-primary btn-sm" onclick="printForm(${i})">Imprimir</button></div>`});h+='</div>'}
  h+='</div>';el.innerHTML=h;
}
function toggleFormEmp(id){if(formSelectedEmps.includes(id))formSelectedEmps=formSelectedEmps.filter(i=>i!==id);else formSelectedEmps.push(id);render()}
async function analyzeForm(){const btn=document.getElementById('formBtn');btn.textContent='Analisando...';btn.disabled=true;try{formFields=await api('/api/ocr',{method:'POST',body:{image:formImageData,mimeType:formImageType,type:'form'}});showToast('Formulário analisado!')}catch(e){showToast('Erro: '+e.message,'error')}render()}
function generateForms(){formResult=formSelectedEmps.map(id=>{const e=employees.find(x=>x.id==id);if(!e)return null;return{employee:e,fields:formFields.fields.map(f=>({label:f.label,value:f.key==='custom'?'':(e[f.key]||'')}))}}).filter(Boolean);render()}
function printForm(i){const r=formResult[i];const h=`<!DOCTYPE html><html><head><meta charset="utf-8"><title>${formFields?.formTitle||'Formulário'} - ${r.employee.nome}</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',system-ui,sans-serif;padding:40px;color:#1e293b}h1{font-size:20px;text-align:center;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}h2{font-size:13px;text-align:center;margin-bottom:28px;color:#64748b;font-weight:400}.grid{display:grid;grid-template-columns:1fr 1fr;gap:0}.field{padding:11px 14px;border:1px solid #e2e8f0;border-top:none;display:flex;flex-direction:column}.field:nth-child(1),.field:nth-child(2){border-top:1px solid #e2e8f0}.field label{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:#94a3b8;margin-bottom:3px;font-weight:600}.field span{font-size:13px;min-height:18px}.footer{margin-top:50px;display:flex;justify-content:space-between;padding:0 16px}.sig{text-align:center;width:240px}.sig .line{border-top:1px solid #1e293b;padding-top:5px;font-size:10px;color:#64748b}@media print{body{padding:20px}}</style></head><body><h1>${formFields?.formTitle||'Formulário'}</h1><h2>${r.employee.nome} — ${r.employee.cargo||''}</h2><div class="grid">${r.fields.map(f=>'<div class="field"><label>'+f.label+'</label><span>'+(f.value||'&mdash;')+'</span></div>').join('')}</div><div class="footer"><div class="sig"><div class="line">Assinatura do Funcionário</div></div><div class="sig"><div class="line">Assinatura do Responsável</div></div></div><script>window.print();<\/script></body></html>`;const w=window.open('','_blank');w.document.write(h);w.document.close()}

document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('loginScreen').style.display!=='none')handleAuth()});
checkAuth();
</script>
</body>
</html>
