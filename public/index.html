<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema RH — Gestão de Funcionários</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root{--bg:#f0f2f5;--sidebar:#0c1222;--card:#fff;--border:#e3e6eb;--text:#0f172a;--text-sec:#5a6577;--text-muted:#8e99a9;--accent:#2563eb;--accent-light:#dbeafe;--accent-dark:#1d4ed8;--success:#059669;--success-light:#d1fae5;--danger:#dc2626;--danger-light:#fee2e2;--warning:#d97706}
  *{margin:0;padding:0;box-sizing:border-box}body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
  ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#c8cdd4;border-radius:10px}
  input,select,textarea{font-family:inherit}input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)!important;box-shadow:0 0 0 3px rgba(37,99,235,.1)!important}
  .login-screen{display:flex;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#0c1222,#1e3a5f)}
  .login-card{background:#fff;border-radius:20px;padding:48px 40px;width:400px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .login-logo{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#2563eb,#60a5fa);display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:800;color:#fff;margin:0 auto 20px}
  .login-title{text-align:center;font-size:22px;font-weight:800;margin-bottom:4px}.login-sub{text-align:center;font-size:13px;color:var(--text-sec);margin-bottom:28px}
  .login-input{width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:10px;font-size:14px;margin-bottom:12px;background:#f8f9fb}
  .login-btn{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}.login-btn:hover{background:var(--accent-dark)}
  .login-toggle{text-align:center;margin-top:18px;font-size:13px;color:var(--text-sec)}.login-toggle a{color:var(--accent);cursor:pointer;font-weight:600;text-decoration:none}
  .login-error{background:var(--danger-light);color:var(--danger);padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px;display:none}
  .app{display:none;height:100vh;overflow:hidden}
  .sidebar{width:250px;min-width:250px;background:var(--sidebar);display:flex;flex-direction:column}
  .sidebar-header{padding:24px 20px;border-bottom:1px solid rgba(255,255,255,.06)}.sidebar-brand{display:flex;align-items:center;gap:12px}
  .sidebar-logo{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#2563eb,#60a5fa);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff}
  .sidebar-title{color:#f1f5f9;font-size:17px;font-weight:700}.sidebar-sub{color:#5a6577;font-size:11px;margin-top:2px}
  .sidebar-nav{flex:1;padding:16px 10px;display:flex;flex-direction:column;gap:2px}
  .nav-label{font-size:10px;font-weight:700;color:#4a5568;text-transform:uppercase;letter-spacing:.08em;padding:16px 12px 8px}
  .nav-item{display:flex;align-items:center;gap:11px;padding:10px 14px;border-radius:8px;cursor:pointer;transition:all .2s;color:#8e99a9;font-size:13.5px;font-weight:500;user-select:none}
  .nav-item:hover{background:rgba(96,165,250,.08);color:#bcc5d3}.nav-item.active{background:rgba(96,165,250,.14);color:#60a5fa;font-weight:600}
  .nav-icon{font-size:17px;width:22px;text-align:center;flex-shrink:0}
  .sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.06)}.sidebar-footer-info{font-size:12px;color:#4a5568;margin-bottom:8px}
  .logout-btn{width:100%;padding:8px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#8e99a9;font-size:12px;cursor:pointer;font-family:inherit;font-weight:600}
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .topbar{background:var(--card);padding:16px 30px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}.topbar h1{font-size:18px;font-weight:700}
  .content{flex:1;overflow-y:auto;padding:28px 30px}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
  .btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-dark)}.btn-secondary{background:var(--card);border:1px solid var(--border);color:var(--text)}.btn-success{background:var(--success);color:#fff}.btn-danger{background:var(--danger-light);color:var(--danger);border:1px solid #fecaca}
  .btn-sm{padding:6px 14px;font-size:12px}.btn-lg{padding:13px 28px;font-size:15px;font-weight:700}
  .search-input{padding:9px 14px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:#f8f9fb;width:280px}
  .card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:24px;margin-bottom:14px}
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px;margin-bottom:24px}
  .stat-card{background:var(--card);border-radius:14px;padding:22px;border:1px solid var(--border)}.stat-label{font-size:12px;color:var(--text-muted);font-weight:600;margin-bottom:8px}.stat-value{font-size:32px;font-weight:800}
  .table-wrap{background:var(--card);border-radius:14px;border:1px solid var(--border);overflow:hidden}
  table{width:100%;border-collapse:collapse}thead th{padding:13px 18px;text-align:left;font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid var(--border);background:#f8f9fb}
  tbody td{padding:13px 18px;font-size:13px;color:var(--text-sec);border-bottom:1px solid #f4f5f7}tbody tr{cursor:pointer;transition:background .15s}tbody tr:hover{background:#f8f9fb}
  .avatar{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;overflow:hidden}.avatar img{width:100%;height:100%;object-fit:cover}.avatar-lg{width:56px;height:56px;font-size:20px;border-radius:14px}
  .badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:6px}
  .form-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px 14px}.form-grid .full{grid-column:1/-1}
  .form-group label{display:block;font-size:11px;font-weight:600;color:var(--text-sec);margin-bottom:4px;text-transform:uppercase;letter-spacing:.02em}
  .form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:#f8f9fb}.form-group .filled{border-color:#93c5fd;background:rgba(37,99,235,.03)}
  .form-group textarea{resize:vertical;min-height:70px}
  .upload-zone{border:2px dashed #c8cdd4;border-radius:14px;padding:50px 30px;text-align:center;cursor:pointer;transition:all .2s;background:#fafbfc}.upload-zone:hover{border-color:var(--accent)}
  .step-num{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0}
  .check-card{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;border:2px solid var(--border);cursor:pointer;transition:all .15s}.check-card.selected{border-color:var(--accent);background:rgba(37,99,235,.03)}
  .check-box{width:20px;height:20px;border-radius:6px;border:2px solid #c8cdd4;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;flex-shrink:0}.check-card.selected .check-box{background:var(--accent);border-color:var(--accent)}
  .section-label{font-size:12px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px}
  .detail-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px 20px}.detail-label{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;margin-bottom:3px}.detail-value{font-size:14px;font-weight:500}
  .action-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.action-card{background:var(--card);border-radius:14px;padding:26px;border:1px solid var(--border);cursor:pointer;transition:all .2s}.action-card:hover{border-color:var(--accent);box-shadow:0 4px 16px rgba(0,0,0,.06);transform:translateY(-1px)}
  .result-row{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border:1px solid var(--border);border-radius:10px;margin-bottom:8px}
  .img-preview{position:relative;border-radius:10px;overflow:hidden;border:1px solid var(--border)}.img-preview img{width:100%;max-height:380px;object-fit:contain;background:#f4f5f7;display:block}
  .img-close{position:absolute;top:6px;right:6px;width:28px;height:28px;border-radius:7px;background:rgba(0,0,0,.55);color:#fff;border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
  .photo-upload{width:120px;height:140px;border-radius:12px;border:2px dashed #c8cdd4;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;background:#f8f9fb;flex-shrink:0}.photo-upload:hover{border-color:var(--accent)}.photo-upload img{width:100%;height:100%;object-fit:cover}
  .empty{text-align:center;padding:60px 20px;color:var(--text-muted)}
  .toast{position:fixed;top:20px;right:20px;padding:13px 22px;border-radius:10px;font-size:13px;font-weight:600;color:#fff;z-index:9999;box-shadow:0 8px 30px rgba(0,0,0,.15);animation:slideIn .35s ease;display:none}
  .loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.8);display:flex;align-items:center;justify-content:center;z-index:999;display:none}.spinner{width:40px;height:40px;border:4px solid #e3e6eb;border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
  .file-type-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;margin-left:8px;text-transform:uppercase}
  @keyframes slideIn{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}@keyframes spin{to{transform:rotate(360deg)}}.anim{animation:fadeUp .35s ease}
</style>
</head>
<body>
<div class="login-screen" id="loginScreen">
  <div class="login-card"><div class="login-logo">RH</div>
    <div class="login-title" id="authTitle">Entrar no Sistema</div>
    <div class="login-sub" id="authSub">Faça login para acessar o Sistema RH</div>
    <div class="login-error" id="authError"></div>
    <div id="authFields"><input class="login-input" id="authUser" placeholder="Usuário"><input class="login-input" id="authPass" type="password" placeholder="Senha"></div>
    <button class="login-btn" onclick="handleAuth()">Entrar</button>
    <div class="login-toggle" id="authToggle">Não tem conta? <a onclick="toggleAuthMode()">Criar conta</a></div>
  </div>
</div>
<div class="app" id="app" style="display:flex">
  <div class="sidebar">
    <div class="sidebar-header"><div class="sidebar-brand"><div class="sidebar-logo">RH</div><div><div class="sidebar-title">Sistema RH</div><div class="sidebar-sub">Gestão de Funcionários</div></div></div></div>
    <nav class="sidebar-nav">
      <div class="nav-label">Principal</div>
      <div class="nav-item active" data-view="dashboard" onclick="goTo('dashboard')"><span class="nav-icon">◉</span> Painel</div>
      <div class="nav-item" data-view="list" onclick="goTo('list')"><span class="nav-icon">☰</span> Funcionários</div>
      <div class="nav-label">Ferramentas</div>
      <div class="nav-item" data-view="add" onclick="goTo('add')"><span class="nav-icon">+</span> Novo Cadastro</div>
      <div class="nav-item" data-view="ocr" onclick="goTo('ocr')"><span class="nav-icon">⎘</span> Importar Ficha</div>
      <div class="nav-item" data-view="form-filler" onclick="goTo('form-filler')"><span class="nav-icon">✎</span> Preencher Formulário</div>
    </nav>
    <div class="sidebar-footer"><div class="sidebar-footer-info">Olá, <strong id="userName">Usuário</strong></div><div class="sidebar-footer-info" id="empCounter" style="margin-bottom:10px">0 funcionários</div><button class="logout-btn" onclick="logout()">Sair da conta</button></div>
  </div>
  <div class="main"><div class="topbar"><h1 id="pageTitle">Painel</h1><div class="topbar-actions" id="topbarActions"></div></div><div class="content" id="content"></div></div>
</div>
<div class="toast" id="toast"></div>
<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
<input type="file" id="fileInput" accept="image/*" style="display:none">
<input type="file" id="formFileInput" accept="image/*,.pdf,.doc,.docx,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document" style="display:none">
<input type="file" id="photoInput" accept="image/*" style="display:none">

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const SECTIONS=[{section:"Dados Pessoais",fields:[{key:"nome",label:"Nome Completo",full:true},{key:"cpf",label:"CPF"},{key:"rg",label:"RG"},{key:"orgaoEmissor",label:"Órgão Emissor"},{key:"dataNascimento",label:"Data de Nascimento"},{key:"sexo",label:"Sexo",options:["Masculino","Feminino","Outro"]},{key:"estadoCivil",label:"Estado Civil",options:["Solteiro(a)","Casado(a)","Divorciado(a)","Viúvo(a)","União Estável"]},{key:"nacionalidade",label:"Nacionalidade"},{key:"naturalidade",label:"Naturalidade"},{key:"nomeMae",label:"Nome da Mãe",full:true},{key:"nomePai",label:"Nome do Pai",full:true}]},{section:"Endereço",fields:[{key:"endereco",label:"Logradouro",full:true},{key:"numero",label:"Número"},{key:"complemento",label:"Complemento"},{key:"bairro",label:"Bairro"},{key:"cidade",label:"Cidade"},{key:"estado",label:"UF"},{key:"cep",label:"CEP"}]},{section:"Contato",fields:[{key:"telefone",label:"Telefone"},{key:"celular",label:"Celular"},{key:"email",label:"E-mail",full:true}]},{section:"Documentos",fields:[{key:"ctpsNumero",label:"CTPS Nº"},{key:"ctpsSerie",label:"Série"},{key:"ctpsUf",label:"UF"},{key:"pisPasep",label:"PIS/PASEP"},{key:"tituloEleitor",label:"Título Eleitor"},{key:"zonaEleitoral",label:"Zona"},{key:"secaoEleitoral",label:"Seção"},{key:"reservista",label:"Reservista"},{key:"cnhNumero",label:"CNH Nº"},{key:"cnhCategoria",label:"CNH Cat."},{key:"cnhValidade",label:"CNH Val."}]},{section:"Profissional",fields:[{key:"cargo",label:"Cargo"},{key:"departamento",label:"Departamento"},{key:"dataAdmissao",label:"Admissão"},{key:"salario",label:"Salário"},{key:"tipoContrato",label:"Contrato",options:["CLT","PJ","Temporário","Estágio","Menor Aprendiz"]},{key:"jornadaTrabalho",label:"Jornada"},{key:"escolaridade",label:"Escolaridade",options:["Fund. Incompleto","Fund. Completo","Médio Incompleto","Médio Completo","Sup. Incompleto","Sup. Completo","Pós-Graduação","Mestrado","Doutorado"]}]},{section:"Bancário",fields:[{key:"banco",label:"Banco"},{key:"agencia",label:"Agência"},{key:"conta",label:"Conta"},{key:"tipoConta",label:"Tipo",options:["Corrente","Poupança"]},{key:"chavePix",label:"PIX",full:true}]},{section:"Saúde",fields:[{key:"tipoSanguineo",label:"Sangue",options:["A+","A-","B+","B-","AB+","AB-","O+","O-"]},{key:"alergias",label:"Alergias",full:true},{key:"contatoEmergencia",label:"Contato Emergência",full:true},{key:"telEmergencia",label:"Tel. Emergência"}]},{section:"Dependentes",fields:[{key:"dependentes",label:"Dependentes",full:true,multiline:true}]}];
const ALL_KEYS=SECTIONS.flatMap(s=>s.fields.map(f=>f.key));
function emptyEmp(){const o={};ALL_KEYS.forEach(k=>o[k]='');o.photo='';return o}
function ini(n){return(n||'?').split(' ').slice(0,2).map(w=>(w[0]||'').toUpperCase()).join('')}
function avt(e,c){return e.photo?`<div class="avatar ${c||''}" style="background:#eee"><img src="${e.photo}"></div>`:`<div class="avatar ${c||''}" style="background:#dbeafe;color:var(--accent)">${ini(e.nome)}</div>`}

let employees=[],currentView='dashboard',editData=emptyEmp(),selectedId=null,authMode='login';
let ocrImageData=null,ocrImageType='';
// Form filler state
let formFileType='',formImageB64='',formImageMime='',formPdfB64='',formDocxB64='',formPreviewUrl='';
let formFields=null,formSelectedEmps=[],formResult=null;

async function api(u,o={}){const r=await fetch(u,{headers:{'Content-Type':'application/json'},...o,body:o.body?JSON.stringify(o.body):undefined});const d=await r.json();if(!r.ok)throw new Error(d.error||'Erro');return d}
function toast(m,t='success'){const e=document.getElementById('toast');e.textContent=m;e.style.background=t==='error'?'#dc2626':'#059669';e.style.display='block';setTimeout(()=>e.style.display='none',3000)}
function loading(v){document.getElementById('loadingOverlay').style.display=v?'flex':'none'}

// Auth
function toggleAuthMode(){authMode=authMode==='login'?'register':'login';document.getElementById('authTitle').textContent=authMode==='login'?'Entrar no Sistema':'Criar Conta';document.getElementById('authSub').textContent=authMode==='login'?'Faça login':'Crie sua conta';document.getElementById('authFields').innerHTML=authMode==='register'?'<input class="login-input" id="authName" placeholder="Seu nome"><input class="login-input" id="authUser" placeholder="Usuário"><input class="login-input" id="authPass" type="password" placeholder="Senha">':'<input class="login-input" id="authUser" placeholder="Usuário"><input class="login-input" id="authPass" type="password" placeholder="Senha">';document.getElementById('authToggle').innerHTML=authMode==='register'?'Já tem conta? <a onclick="toggleAuthMode()">Login</a>':'Não tem conta? <a onclick="toggleAuthMode()">Criar conta</a>';document.getElementById('authError').style.display='none'}
async function handleAuth(){const err=document.getElementById('authError');err.style.display='none';const u=document.getElementById('authUser')?.value?.trim(),p=document.getElementById('authPass')?.value,n=document.getElementById('authName')?.value?.trim();if(authMode==='register'&&!n){err.textContent='Preencha nome';err.style.display='block';return}if(!u||!p){err.textContent='Preencha tudo';err.style.display='block';return}try{loading(true);const d=await api(authMode==='login'?'/api/login':'/api/register',{method:'POST',body:authMode==='login'?{username:u,password:p}:{username:u,password:p,name:n}});enterApp(d.name)}catch(e){err.textContent=e.message;err.style.display='block'}finally{loading(false)}}
async function checkAuth(){try{const d=await api('/api/me');if(d.logged)enterApp(d.name)}catch{}}
async function enterApp(name){document.getElementById('loginScreen').style.display='none';document.getElementById('app').style.display='flex';document.getElementById('userName').textContent=name;await loadEmps();render()}
async function logout(){try{await api('/api/logout',{method:'POST'})}catch{}document.getElementById('loginScreen').style.display='flex';document.getElementById('app').style.display='none';employees=[]}

async function loadEmps(){try{employees=await api('/api/employees')}catch{employees=[]}updCount()}
function updCount(){const c=employees.length;document.getElementById('empCounter').textContent=c+' funcionário'+(c!==1?'s':'')}

async function saveEmp(){if(!editData.nome?.trim()){toast('Nome obrigatório','error');return}loading(true);try{if(editData.id)await api('/api/employees/'+editData.id,{method:'PUT',body:editData});else await api('/api/employees',{method:'POST',body:editData});await loadEmps();toast(editData.id?'Atualizado!':'Cadastrado!');goTo('list')}catch(e){toast(e.message,'error')}loading(false)}
async function delEmp(id){if(!confirm('Excluir?'))return;loading(true);try{await api('/api/employees/'+id,{method:'DELETE'});await loadEmps();toast('Excluído');goTo('list')}catch(e){toast(e.message,'error')}loading(false)}

function goTo(v,id){currentView=v;selectedId=id||null;if(v==='add')editData=emptyEmp();if(v==='edit'&&id){const e=employees.find(x=>x.id==id);if(e)editData={...e}}if(v==='ocr')ocrImageData=null;if(v==='form-filler'){formFileType='';formImageB64='';formPdfB64='';formDocxB64='';formPreviewUrl='';formFields=null;formSelectedEmps=[];formResult=null}render()}

function render(){
  document.querySelectorAll('.nav-item').forEach(n=>{const v=n.dataset.view;n.classList.toggle('active',v===currentView||(v==='list'&&(currentView==='detail'||currentView==='edit')))});
  const t={dashboard:'Painel',list:'Funcionários',add:'Novo Cadastro',edit:'Editar',detail:'Detalhes',ocr:'Importar Ficha','form-filler':'Preencher Formulário'};
  document.getElementById('pageTitle').textContent=t[currentView]||'RH';
  const ta=document.getElementById('topbarActions');
  ta.innerHTML=(currentView==='list'||currentView==='dashboard')?'<input class="search-input" placeholder="Buscar..." oninput="handleSearch(this.value)"><button class="btn btn-primary" onclick="goTo(\'add\')">+ Novo</button>':'';
  const el=document.getElementById('content');
  ({dashboard:renderDash,list:()=>renderList(''),add:renderForm,edit:renderForm,detail:renderDetail,ocr:renderOCR,'form-filler':renderFiller})[currentView]?.(el);
  updCount();
}
function handleSearch(v){if(currentView==='dashboard')currentView='list';renderList(v)}

function renderDash(el){
  const e=employees,clt=e.filter(x=>x.tipoContrato==='CLT').length,pj=e.filter(x=>x.tipoContrato==='PJ').length;
  let h=`<div class="anim"><div class="stats-grid"><div class="stat-card"><div class="stat-label">Total</div><div class="stat-value" style="color:var(--accent)">${e.length}</div></div><div class="stat-card"><div class="stat-label">CLT</div><div class="stat-value" style="color:var(--success)">${clt}</div></div><div class="stat-card"><div class="stat-label">PJ</div><div class="stat-value" style="color:var(--warning)">${pj}</div></div></div>
  <div class="action-grid"><div class="action-card" onclick="goTo('ocr')"><div style="font-size:26px;margin-bottom:10px">📄</div><div style="font-size:15px;font-weight:700;margin-bottom:4px">Importar Ficha</div><div style="font-size:12.5px;color:var(--text-muted);line-height:1.6">Foto ou print de ficha — IA extrai tudo</div></div><div class="action-card" onclick="goTo('form-filler')"><div style="font-size:26px;margin-bottom:10px">📋</div><div style="font-size:15px;font-weight:700;margin-bottom:4px">Preencher Formulário</div><div style="font-size:12.5px;color:var(--text-muted);line-height:1.6">PDF, Word ou imagem — preenche e gera PDF</div></div></div>`;
  if(e.length){h+='<div style="margin-top:24px"><h3 style="font-size:15px;font-weight:700;margin-bottom:14px">Últimos cadastros</h3>';e.slice(0,5).forEach(x=>{h+=`<div class="result-row" onclick="goTo('detail','${x.id}')" style="cursor:pointer"><div style="display:flex;align-items:center;gap:12px">${avt(x)}<div><div style="font-weight:600;font-size:13px">${x.nome}</div><div style="font-size:12px;color:var(--text-muted)">${x.cargo||''} ${x.cpf?'· '+x.cpf:''}</div></div></div></div>`});h+='</div>'}
  el.innerHTML=h+'</div>';
}

function renderList(search){
  const el=document.getElementById('content'),s=(search||'').toLowerCase(),f=employees.filter(e=>!s||e.nome?.toLowerCase().includes(s)||e.cpf?.includes(s)||e.cargo?.toLowerCase().includes(s));
  if(!f.length){el.innerHTML='<div class="anim empty"><div style="font-size:44px;opacity:.6;margin-bottom:14px">☰</div><div style="font-size:15px;font-weight:600">'+(employees.length?'Nenhum resultado':'Nenhum funcionário')+'</div></div>';return}
  let h='<div class="anim table-wrap"><table><thead><tr><th>Funcionário</th><th>CPF</th><th>Cargo</th><th>Admissão</th><th>Contrato</th><th></th></tr></thead><tbody>';
  f.forEach(e=>{const bc=e.tipoContrato==='CLT'?'background:#d1fae5;color:#166534':e.tipoContrato==='PJ'?'background:#fef3c7;color:#854d0e':'background:#f1f5f9;color:#475569';h+=`<tr onclick="goTo('detail','${e.id}')"><td><div style="display:flex;align-items:center;gap:10px">${avt(e)}<div><div style="font-weight:600;color:var(--text)">${e.nome}</div><div style="font-size:11px;color:var(--text-muted)">${e.email||''}</div></div></div></td><td>${e.cpf||'—'}</td><td>${e.cargo||'—'}</td><td>${e.dataAdmissao||'—'}</td><td>${e.tipoContrato?'<span class="badge" style="'+bc+'">'+e.tipoContrato+'</span>':'—'}</td><td style="text-align:right;color:var(--text-muted)">›</td></tr>`});
  el.innerHTML=h+'</tbody></table></div>';
}

function renderDetail(el){
  const e=employees.find(x=>x.id==selectedId);if(!e)return;
  let h=`<div class="anim"><div style="display:flex;gap:10px;margin-bottom:20px"><button class="btn btn-secondary" onclick="goTo('list')">← Voltar</button><button class="btn btn-primary" onclick="goTo('edit','${e.id}')">Editar</button><button class="btn btn-danger" onclick="delEmp('${e.id}')">Excluir</button></div><div class="card"><div style="display:flex;align-items:center;gap:18px">${avt(e,'avatar-lg')}<div><h2 style="font-size:20px;font-weight:800">${e.nome}</h2><div style="font-size:13px;color:var(--text-sec);margin-top:3px">${e.cargo||''} ${e.departamento?'· '+e.departamento:''}</div></div></div></div>`;
  SECTIONS.forEach(s=>{if(!s.fields.some(f=>e[f.key]))return;h+=`<div class="card"><div class="section-label">${s.section}</div><div class="detail-grid">`;s.fields.filter(f=>e[f.key]).forEach(f=>{h+=`<div ${f.full?'style="grid-column:1/-1"':''}><div class="detail-label">${f.label}</div><div class="detail-value">${e[f.key]}</div></div>`});h+='</div></div>'});
  el.innerHTML=h+'</div>';
}

function renderForm(el){
  let h=`<div class="anim"><div style="display:flex;gap:10px;margin-bottom:20px"><button class="btn btn-secondary" onclick="goTo('list')">← Voltar</button><button class="btn btn-success btn-lg" onclick="saveEmp()">Salvar</button></div>
  <div class="card"><div class="section-label">Foto</div><div style="display:flex;align-items:center;gap:20px"><div class="photo-upload" onclick="pickPhoto()">${editData.photo?'<img src="'+editData.photo+'">':'<div style="font-size:11px;color:var(--text-muted);text-align:center;padding:4px">📷<br>Adicionar<br>foto</div>'}</div><div style="font-size:13px;color:var(--text-sec)">Clique para adicionar foto ${editData.photo?'<br><button class="btn btn-sm btn-danger" onclick="editData.photo=\\'\\';render()" style="margin-top:8px">Remover</button>':''}</div></div></div>`;
  SECTIONS.forEach(s=>{h+=`<div class="card"><div class="section-label">${s.section}</div><div class="form-grid">`;s.fields.forEach(f=>{const v=editData[f.key]||'',cls=f.full?'form-group full':'form-group',fc=v?'filled':'';h+=`<div class="${cls}"><label>${f.label}</label>`;if(f.options)h+=`<select class="${fc}" onchange="editData['${f.key}']=this.value"><option value="">—</option>${f.options.map(o=>`<option value="${o}" ${v===o?'selected':''}>${o}</option>`).join('')}</select>`;else if(f.multiline)h+=`<textarea class="${fc}" onchange="editData['${f.key}']=this.value">${v}</textarea>`;else h+=`<input class="${fc}" value="${v}" onchange="editData['${f.key}']=this.value">`;h+='</div>'});h+='</div></div>'});
  el.innerHTML=h+'<button class="btn btn-success btn-lg" onclick="saveEmp()">Salvar</button></div>';
}
function pickPhoto(){const i=document.getElementById('photoInput');i.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas');const M=300;let w=img.width,h=img.height;if(w>h){if(w>M){h*=M/w;w=M}}else{if(h>M){w*=M/h;h=M}}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);editData.photo=c.toDataURL('image/jpeg',.8);render()};img.src=ev.target.result};r.readAsDataURL(f);i.value=''};i.click()}

// ── OCR ──
function renderOCR(el){
  let h='<div class="anim" style="max-width:780px"><div class="card"><h3 style="font-size:15px;font-weight:700;margin-bottom:6px">Importar Ficha de Registro</h3><p style="font-size:13px;color:var(--text-sec);margin-bottom:22px">Envie foto ou print da ficha — IA extrai automaticamente.</p>';
  if(!ocrImageData)h+='<div class="upload-zone" onclick="pickImg(\'ocr\')"><div style="font-size:36px;margin-bottom:10px">📄</div><div style="font-size:14px;font-weight:600">Clique para enviar</div><div style="font-size:12px;color:var(--text-muted)">JPG, PNG</div></div>';
  else h+=`<div class="img-preview" style="margin-bottom:14px"><img src="data:${ocrImageType};base64,${ocrImageData}"><button class="img-close" onclick="ocrImageData=null;render()">×</button></div><div style="display:flex;gap:10px"><button class="btn btn-primary btn-lg" style="flex:1" onclick="runOCR()" id="ocrBtn">Extrair Dados</button><button class="btn btn-secondary" onclick="pickImg('ocr')">Trocar</button></div>`;
  el.innerHTML=h+'<div id="ocrError"></div></div><div id="ocrResult"></div></div>';
}
function pickImg(t){const i=document.getElementById('fileInput');i.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{const b=ev.target.result.split(',')[1];if(t==='ocr'){ocrImageData=b;ocrImageType=f.type||'image/jpeg'}i.value='';render()};r.readAsDataURL(f)};i.click()}

async function runOCR(){const btn=document.getElementById('ocrBtn');btn.textContent='Analisando...';btn.disabled=true;btn.style.background='#94a3b8';document.getElementById('ocrError').innerHTML='';
  try{const p=await api('/api/ocr',{method:'POST',body:{image:ocrImageData,mimeType:ocrImageType,type:'ocr'}});editData=emptyEmp();Object.keys(p).forEach(k=>{if(p[k]&&editData.hasOwnProperty(k))editData[k]=p[k]});toast('Dados extraídos!');
    let r='<div class="card" style="margin-top:14px"><div style="display:flex;justify-content:space-between;margin-bottom:18px"><div><h3 style="font-size:15px;font-weight:700">Dados Extraídos</h3><p style="font-size:12px;color:var(--text-sec)">Revise e salve</p></div><button class="btn btn-success" onclick="saveEmp()">Salvar</button></div>';
    r+='<div style="display:flex;align-items:center;gap:20px;margin-bottom:18px;padding-bottom:18px;border-bottom:1px solid var(--border)"><div class="photo-upload" onclick="pickPhoto()">'+(editData.photo?'<img src="'+editData.photo+'">':'<div style="font-size:11px;color:var(--text-muted);text-align:center;padding:4px">📷<br>Foto</div>')+'</div><div><div style="font-size:15px;font-weight:700">'+(editData.nome||'?')+'</div><div style="font-size:13px;color:var(--text-sec)">'+(editData.cargo||'')+' '+(editData.cpf?'· '+editData.cpf:'')+'</div></div></div>';
    SECTIONS.forEach(s=>{r+=`<div class="section-label" style="margin-top:14px">${s.section}</div><div class="form-grid">`;s.fields.forEach(f=>{const v=editData[f.key]||'',c=f.full?'form-group full':'form-group',fc=v?'filled':'';r+=`<div class="${c}"><label>${f.label}</label>`;if(f.options)r+=`<select class="${fc}" onchange="editData['${f.key}']=this.value"><option value="">—</option>${f.options.map(o=>`<option value="${o}" ${v===o?'selected':''}>${o}</option>`).join('')}</select>`;else r+=`<input class="${fc}" value="${v}" onchange="editData['${f.key}']=this.value">`;r+='</div>'});r+='</div>'});
    document.getElementById('ocrResult').innerHTML=r+'<button class="btn btn-success btn-lg" onclick="saveEmp()" style="margin-top:14px">Salvar</button></div>';
  }catch(e){document.getElementById('ocrError').innerHTML='<div style="margin-top:14px;padding:12px;background:var(--danger-light);border-radius:10px;color:var(--danger);font-size:13px">'+e.message+'</div>'}
  btn.textContent='Extrair Dados';btn.disabled=false;btn.style.background=''}

// ── FORM FILLER ──
function renderFiller(el){
  if(!employees.length){el.innerHTML='<div class="anim empty"><div style="font-size:44px;opacity:.6;margin-bottom:14px">📋</div><div style="font-size:15px;font-weight:600">Nenhum funcionário</div><button class="btn btn-primary" onclick="goTo(\'add\')" style="margin-top:18px">Cadastrar</button></div>';return}
  let h='<div class="anim">';
  // Step 1: Upload
  h+='<div class="card"><div style="display:flex;align-items:center;gap:12px;margin-bottom:16px"><div class="step-num" style="background:var(--accent-light);color:var(--accent)">1</div><div><h3 style="font-size:14px;font-weight:700;margin:0">Enviar Formulário</h3><p style="font-size:12px;color:var(--text-sec);margin:0">Imagem, PDF ou Word</p></div></div>';
  if(!formFileType)h+='<div class="upload-zone" onclick="pickFormFile()"><div style="font-size:14px;font-weight:600">Clique para enviar</div><div style="font-size:12px;color:var(--text-muted);margin-top:4px">Plano de saúde, vale-transporte, declaração...<br><strong>Aceita: Imagem, PDF e Word (.docx)</strong></div></div>';
  else{
    h+='<div style="display:flex;gap:14px;align-items:flex-start">';
    if(formPreviewUrl)h+='<div class="img-preview" style="flex:0 0 200px"><img src="'+formPreviewUrl+'" style="width:200px;height:160px;object-fit:cover"><button class="img-close" onclick="goTo(\'form-filler\')">×</button></div>';
    else h+='<div style="flex:0 0 200px;height:160px;background:#f8f9fb;border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center"><div style="text-align:center"><div style="font-size:28px">📄</div><span class="file-type-badge" style="background:var(--accent-light);color:var(--accent)">'+formFileType.toUpperCase()+'</span></div></div>';
    h+='<div style="flex:1"><button class="btn btn-primary" style="width:100%" onclick="analyzeForm()" id="formBtn">'+(formFields?'✓ Analisado':'Analisar Formulário')+'</button>'+(formFields?'<div style="margin-top:6px;font-size:12px;color:var(--success);font-weight:600">'+(formFields.fields?.length||0)+' campos — "'+formFields.formTitle+'"</div>':'')+'</div></div>';
  }
  h+='</div>';
  // Step 2: Select employees
  if(formFields){h+='<div class="card"><div style="display:flex;align-items:center;gap:12px;margin-bottom:16px"><div class="step-num" style="background:var(--accent-light);color:var(--accent)">2</div><div><h3 style="font-size:14px;font-weight:700;margin:0">Selecionar Funcionários</h3></div></div><div style="display:flex;gap:8px;margin-bottom:14px"><button class="btn btn-sm btn-secondary" onclick="formSelectedEmps=employees.map(e=>e.id);render()">Todos</button><button class="btn btn-sm btn-secondary" onclick="formSelectedEmps=[];render()">Limpar</button></div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px">';
    employees.forEach(e=>{const s=formSelectedEmps.includes(e.id);h+=`<div class="check-card ${s?'selected':''}" onclick="toggleSel(${e.id})"><div class="check-box">${s?'✓':''}</div><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.nome}</div><div style="font-size:11px;color:var(--text-muted)">${e.cargo||''}</div></div></div>`});
    h+='</div>';if(formSelectedEmps.length)h+='<button class="btn btn-success btn-lg" style="width:100%;margin-top:14px" onclick="genForms()">Gerar '+formSelectedEmps.length+' PDF'+(formSelectedEmps.length>1?'s':'')+'</button>';h+='</div>'}
  // Step 3: Results
  if(formResult){h+='<div class="card"><div style="display:flex;align-items:center;gap:12px;margin-bottom:16px"><div class="step-num" style="background:var(--success-light);color:var(--success)">3</div><div><h3 style="font-size:14px;font-weight:700;margin:0">PDFs Prontos</h3><p style="font-size:12px;color:var(--text-sec);margin:0">Clique para baixar o PDF preenchido</p></div></div>';
    formResult.forEach((r,i)=>{h+=`<div class="result-row"><div style="display:flex;align-items:center;gap:10px">${avt(r.emp)}<div><div style="font-weight:600;font-size:13px">${r.emp.nome}</div><div style="font-size:11px;color:var(--text-muted)">${r.filled}/${r.total} campos</div></div></div><button class="btn btn-primary btn-sm" onclick="downloadPdf(${i})">⬇ Baixar PDF</button></div>`});
    h+='</div>'}
  el.innerHTML=h+'</div>';
}

function toggleSel(id){formSelectedEmps.includes(id)?formSelectedEmps=formSelectedEmps.filter(i=>i!==id):formSelectedEmps.push(id);render()}

function pickFormFile(){
  const i=document.getElementById('formFileInput');
  i.onchange=async e=>{
    const file=e.target.files[0];if(!file)return;
    const ext=file.name.split('.').pop().toLowerCase();
    const reader=new FileReader();
    reader.onload=async ev=>{
      const b64=ev.target.result.split(',')[1];
      if(ext==='pdf'){
        formFileType='pdf';formPdfB64=b64;formDocxB64='';
        // Render PDF page 1 to image for preview + AI
        try{
          const pdf=await pdfjsLib.getDocument({data:atob(b64).split('').map(c=>c.charCodeAt(0))}).promise;
          const page=await pdf.getPage(1);
          const vp=page.getViewport({scale:2});
          const canvas=document.createElement('canvas');canvas.width=vp.width;canvas.height=vp.height;
          await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
          formPreviewUrl=canvas.toDataURL('image/jpeg',.9);
          formImageB64=formPreviewUrl.split(',')[1];formImageMime='image/jpeg';
        }catch(er){console.error('PDF render error:',er);formPreviewUrl=''}
      }else if(ext==='docx'||ext==='doc'){
        formFileType='docx';formDocxB64=b64;formPdfB64='';formPreviewUrl='';formImageB64='';
      }else{
        formFileType='image';formImageB64=b64;formImageMime=file.type||'image/jpeg';
        formPreviewUrl=ev.target.result;formPdfB64='';formDocxB64='';
      }
      formFields=null;formResult=null;i.value='';render();
    };
    reader.readAsDataURL(file);
  };i.click();
}

async function analyzeForm(){
  const btn=document.getElementById('formBtn');btn.textContent='Analisando...';btn.disabled=true;
  try{
    if(formFileType==='docx'){
      // Extract text from DOCX, then analyze
      const textResult=await api('/api/extract-docx',{method:'POST',body:{fileBase64:formDocxB64}});
      formFields=await api('/api/analyze-text',{method:'POST',body:{text:textResult.text,type:'form'}});
    }else{
      // Image or PDF rendered as image
      formFields=await api('/api/ocr',{method:'POST',body:{image:formImageB64,mimeType:formImageMime||'image/jpeg',type:'form'}});
    }
    toast('Formulário analisado!');
  }catch(e){toast('Erro: '+e.message,'error')}
  render();
}

function genForms(){
  formResult=formSelectedEmps.map(id=>{
    const emp=employees.find(e=>e.id==id);if(!emp)return null;
    const fields=(formFields.fields||[]).map(f=>({label:f.label,key:f.key,value:f.key==='custom'?'':(emp[f.key]||''),x:f.x,y:f.y,w:f.w}));
    return{emp,fields,filled:fields.filter(f=>f.value).length,total:fields.length};
  }).filter(Boolean);
  render();
}

async function downloadPdf(idx){
  const r=formResult[idx];loading(true);
  try{
    const body={
      fields:r.fields,
      employee:r.emp,
      formTitle:formFields?.formTitle||'Formulário',
    };
    // Include original document for background
    if(formPdfB64)body.originalPdfBase64=formPdfB64;
    else if(formImageB64){body.originalImage=formImageB64;body.originalMimeType=formImageMime}

    const resp=await fetch('/api/generate-pdf',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    if(!resp.ok){const e=await resp.json();throw new Error(e.error)}
    const blob=await resp.blob();
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=(r.emp.nome||'formulario').replace(/[^a-zA-Z0-9\s]/g,'').replace(/\s+/g,'_')+'.pdf';
    a.click();URL.revokeObjectURL(url);
    toast('PDF baixado!');
  }catch(e){toast('Erro: '+e.message,'error')}
  loading(false);
}

document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('loginScreen').style.display!=='none')handleAuth()});
document.getElementById('app').style.display='none';
checkAuth();
</script>
